name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # check: lint + type-check + tests (x86_64 Ubuntu, no Pi hardware required)
  # ──────────────────────────────────────────────────────────────────────────────
  check:
    name: Check (lint + type-check + tests)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: autonomon

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.9"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: autonomon/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('autonomon/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Lint — ruff
        run: uv run ruff check src/ tests/

      - name: Lint — black
        run: uv run black --check src/ tests/

      - name: Type check — mypy
        run: uv run mypy src/ tests/

      - name: Tests — pytest
        run: uv run pytest tests/ -v --cov=src/autonomon --cov-report=term-missing

  # ──────────────────────────────────────────────────────────────────────────────
  # release: create a GitHub Release when a vX.Y.Z tag is pushed
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
